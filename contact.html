    <main class="page-shell">
      <section class="contact container reveal" id="contact">
        <h2>LET'S GET IN TOUCH</h2>
        <div class="contact-grid">
          <div class="left">
            <p>Open for AI/ML and frontend-focused design engineering roles.</p>
            <a href="mailto:rajchambyal1357@gmail.com">rajchambyal1357@gmail.com</a>
          </div>

          <form class="right" id="contact-form" novalidate>
            <input
              type="text"
              name="name"
              id="contact-name"
              placeholder="Your Name"
              autocomplete="name"
              required
              minlength="2"
              maxlength="80"
            />
            <input
              type="email"
              name="email"
              id="contact-email"
              placeholder="Email"
              autocomplete="email"
              required
            />
            <textarea
              name="message"
              id="contact-message"
              placeholder="Message"
              required
              minlength="10"
              maxlength="1200"
            ></textarea>
            <button type="submit" id="contact-submit">Send Message</button>
            <p class="form-status" id="contact-status" aria-live="polite"></p>
          </form>
        </div>
      </section>

      <footer class="footer container reveal">
